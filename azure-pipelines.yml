# Docker
# Build a Docker image
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - api/*

resources:
  - repo: self

variables:
  tag: "$(Build.BuildId)"

stages:
  - stage: Build
    displayName: Build image
    jobs:
      - job: Build
        displayName: Build
        pool:
          name: "Azure Pipelines"
        steps:
          - task: AzureKeyVault@2
            inputs:
              azureSubscription: "serviceconnection"
              KeyVaultName: "WhoThisActorVault"
              SecretsFilter: "*"
              RunAsPreJob: true

          - task: Docker@2
            inputs:
              containerRegistry: "whothisactor"
              repository: "whoThisActorApi"
              command: "build"
              Dockerfile: "api/Dockerfile"
              tags: "latest"
              arguments: >
                --platform linux/amd64 
                --build-arg CONNECTIONSTRING=$(CONNECTIONSTRING)
                --build-arg SENHAKEYSTORE=$(SENHAKEYSTORE)
                --build-arg TMDBAPIKEY=$(TMDBAPIKEY)
                --build-arg DBPASSWORD=$(DBPASSWORD)
                --build-arg CLASSIFYADDRESS=$(CLASSIFYADDRESS)

          - task: Docker@2
            inputs:
              containerRegistry: "whothisactor"
              repository: "whoThisActorApi"
              command: "push"
              tags: "latest"
