trigger:
  branches:
    include:
      - main
  paths:
    include:
      - classify/*

stages:
  - stage: BuildClassify
    displayName: Build Classify image
    jobs:
      - job: BuildClassify
        displayName: Build Classify
        pool:
          name: "Azure Pipelines"
        steps:
          - task: AzureKeyVault@2
            inputs:
              azureSubscription: "vault connection"
              KeyVaultName: "WhoThisActorSecrets"
              SecretsFilter: "*"
              RunAsPreJob: true
          - task: Docker@2
            inputs:
              containerRegistry: 'whothisactorRegistry'
              repository: 'whothisactor-classify'
              command: 'build'
              Dockerfile: 'classify/Dockerfile'
              arguments: '--platform linux/amd64 --build-arg CONNECTIONSTRING=$(CONNECTIONSTRING)'

          - task: Docker@2
            inputs:
              containerRegistry: 'whothisactorRegistry'
              repository: 'whothisactor-classify'
              command: 'push'
