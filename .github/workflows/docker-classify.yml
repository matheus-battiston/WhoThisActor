name: Deploy Classify

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "classify/**"

concurrency:
  group: deploy-classify
  cancel-in-progress: false

env:
  CLASSIFY_IMAGE: matheusbattiston/classify

jobs:
  build_classify_amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build classify AMD64
        uses: docker/build-push-action@v5
        with:
          context: ./classify
          push: true
          platforms: linux/amd64
          build-args: |
            OCI_PAR_BASE_URL=${{ secrets.OCI_PAR_BASE_URL }}
          tags: |
            ${{ env.CLASSIFY_IMAGE }}:amd64-${{ github.sha }}

  build_classify_arm64:
    runs-on: [self-hosted, linux, ARM64, whothisbuild]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build classify ARM64
        uses: docker/build-push-action@v5
        with:
          context: ./classify
          push: true
          platforms: linux/arm64
          build-args: |
            OCI_PAR_BASE_URL=${{ secrets.OCI_PAR_BASE_URL }}
          tags: |
            ${{ env.CLASSIFY_IMAGE }}:arm64-${{ github.sha }}

  publish_classify_manifest:
    needs: [build_classify_amd64, build_classify_arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Publish classify manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.CLASSIFY_IMAGE }}:sha-${{ github.sha }} \
            -t ${{ env.CLASSIFY_IMAGE }}:latest \
            ${{ env.CLASSIFY_IMAGE }}:amd64-${{ github.sha }} \
            ${{ env.CLASSIFY_IMAGE }}:arm64-${{ github.sha }}

  trigger_infra_deploy:
    needs: [publish_classify_manifest]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger infra deploy
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.INFRA_REPO_TOKEN }}" \
            https://api.github.com/repos/matheus-battiston/InfraWhoThis/actions/workflows/deploy.yaml/dispatches \
            -d '{
              "ref":"main",
              "inputs":{
                "classify_tag":"sha-${{ github.sha }}"
              }
            }'
