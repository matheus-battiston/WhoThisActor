spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 60000
      max-lifetime: 300000
      keepalive-time: 0
      data-source-properties:
        reWriteBatchedInserts: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      "[hibernate.jdbc.batch_size]": 50
      "[hibernate.order_inserts]": true
      "[hibernate.order_updates]": true
      "[hibernate.id.new_generator_mappings]": true
      "[hibernate.format_sql]": true
      "[hibernate.generate_statistics]": true

  web:
    error:
      include-message: always

auth:
  auth-url: ${AUTH_URL}
  callback:
    cookie-name: WHOTHIS_TOKEN
    redirect-url: ${FRONT_URL}
    max-age: 86400
  jwt:
    public-key: ${JWT_PUBLIC_KEY}
    expiration: 86400000
  public-paths:
    - /classificar
    - /atores
    - /atores/**
    - /series
    - /series/**
    - /filmes
    - /filmes/**
    - /swagger-ui.html
    - /swagger-ui/**
    - /v3/api-docs/**
    - /actuator/health
    - /actuator/health/**
    - /oauth2/callback
  enabled: true

server:
  port: 8081
